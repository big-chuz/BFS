version: '3.8'

services:
  ################################################################
  # 1. LiteLLM API Gateway
  ################################################################
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml"]
    ports:
      - "8000:4000" # Expose the proxy on host port 8000
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    depends_on:
      vllm-reasoning:
        condition: service_started
      vllm-multimodal:
        condition: service_started
    restart: always

  ################################################################
  # 2.  Large model (Llama-3.1-405B)
  ################################################################
  vllm-reasoning:
    image: vllm/vllm-openai:latest
    command:
      - "--model"
      - "clowman/Llama-3.1-405B-Instruct-AWQ-Int4"
      - "--tensor-parallel-size"
      - "4"
      - "--host"
      - "0.0.0.0"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "llama3_json"  # Added required parser argument
      - "--max-model-len"
      - "32768"
      - "--gpu-memory-utilization"
      - "0.90"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1', '2', '3', '4']
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - ~/hugging_face:/root/.cache/huggingface
    ipc: host
    restart: always

  ################################################################
  # 3. Vision Model (currently Qwen2.5-VL-32B-Instruct)
  ################################################################
 vllm-multimodal:
     image: vllm/vllm-openai:latest
     command:
       - "--model"
       - "Qwen/Qwen3-Omni-30B-A3B-Instruct"
       - "--tensor-parallel-size"
       - "2"
       - "--host"
       - "0.0.0.0"
       - "--enable-auto-tool-choice"
       - "--tool-call-parser"
       - "llama3_json"
       - "--max-model-len"
       - "32768"
       - "--gpu-memory-utilization"
       - "0.95"
       - "--dtype"
       - "auto"
#...
################################################################
  # 5. Text-to-Speech Model (Dia 1.6B with Gradio)
  ################################################################
  gradio-tts:
    build:
      context: ./dia_gradio
    ports:
      - "7860:7860" # <-- This is the crucial line
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['7']
              capabilities: [gpu]
    volumes:
      - ~/hugging_face:/root/.cache/huggingface
    restart: always
